events {
    worker_connections 1024;
}

http {
    client_max_body_size 100M;
    client_body_buffer_size 16M;
    client_body_timeout 300s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    server {
        # --- AJUSTE: Escuta em 443 com SSL ---
        listen 443 ssl; 
        server_name nuted-ia.dev www.nuted-ia.dev 164.41.75.220;

        # --- AJUSTE: Caminhos dos certificados (Devem coincidir com o volume do Docker) ---
        ssl_certificate /etc/letsencrypt/live/nuted-ia.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nuted-ia.dev/privkey.pem;

        # Configurações de segurança básicas para o SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # --- AJUSTE: X-Forwarded-Proto agora é https ---
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Ollama
        location /ollama-server/ {
            proxy_pass http://ollama:11434/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 500M;
            proxy_read_timeout 600s;
        }

        # n8n
        location /n8n/ {
            proxy_pass http://n8n:5678/;  
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
        }

        # Metabase
        location /metabase/ {
            proxy_pass http://metabase:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # RabbitMQ Management UI (HTTPS via port 7771)
        location /rabbitmq/ {
            proxy_pass http://rabbitmq:15672/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Open WebUI (Raiz)
        location / {
            proxy_pass http://open-webui:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300s;
        }
    }
}
