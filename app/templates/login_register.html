{% extends 'base.html' %}

{% block head_styles %}
    <style>
        body { 
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            justify-content: center;
            align-items: center;
        }

        /* Adjust main to center content only on login page */
        main {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-custom { 
            width: 100%; 
            max-width: 420px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.8); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .nav-pills {
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
        }

        .nav-pills .nav-link { 
            color: #64748b; 
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.2s;
        }
        
        .nav-pills .nav-link:hover {
            color: #1e293b;
        }

        .nav-pills .nav-link.active { 
            background-color: white; 
            color: #044d84; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            font-weight: 600;
        }

        .form-floating > .form-control {
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        
        .form-floating > .form-control:focus {
            background: white;
            border-color: #044d84;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .logo-icon {
            font-size: 2.5rem;
            color: #044d84;
            margin-bottom: 0.5rem;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: #64748b;
            z-index: 5;
            padding: 0;
            line-height: 1;
        }

        .password-toggle:hover {
            color: #1e293b;
        }

        .auth-support {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 12px;
        }

        .forgot-link {
            border: 0;
            background: transparent;
            color: #044d84;
            font-weight: 600;
            text-decoration: none;
            padding: 0;
        }

        .forgot-link:hover {
            color: #03365f;
            text-decoration: underline;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="card card-custom p-4 p-md-5 mx-3 animate__animated animate__zoomIn">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='file/logo_unieuro.png') }}" alt="Logo Unieuro"
                style="height: 100px; width: auto;">
            <h3 class="fw-bold text-dark m-0 mt-2">EuroEventos</h3>
        </div>
        
        <ul class="nav nav-pills nav-fill mb-4" id="pills-tab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login">Acessar Sistema</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register">Realizar Cadastro</button>
            </li>
        </ul>
        
        <div class="tab-content">
            <!-- LOGIN FORM -->
            <div class="tab-pane fade show active" id="pills-login">
                <form onsubmit="fazerLogin(event)">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="loginCpf" placeholder="CPF" required>
                        <label>CPF</label>
                    </div>
                    <div class="form-floating mb-4 password-wrapper">
                        <input type="password" class="form-control" id="loginPass" placeholder="Senha" required>
                        <label>Senha de Acesso</label>
                        <button
                            type="button"
                            class="password-toggle"
                            id="toggleLoginPass"
                            onclick="togglePasswordVisibility('loginPass', 'toggleLoginPass')"
                            aria-label="Mostrar ou ocultar senha do login"
                        >
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        Autenticar <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                    {% if moodle_login_enabled %}
                    <button type="button" class="btn btn-outline-secondary w-100 mb-2" onclick="entrarComAva()">
                        Acessar via AVA
                    </button>
                    <div class="text-center mb-3">
                        <small class="text-muted">O acesso mediante AVA encontra-se disponível exclusivamente para a comunidade acadêmica do Unieuro.</small>
                    </div>
                    {% endif %}
                    <div class="auth-support text-center mt-2">
                        <button type="button" class="forgot-link" onclick="abrirRecuperacaoSenha(event)">
                            <i class="fa-solid fa-key me-1"></i> Recuperação de Senha
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- REGISTER FORM -->
            <div class="tab-pane fade" id="pills-register">
                <form onsubmit="fazerCadastro(event)">
                    <div class="form-floating mb-2">
                        <input type="text" class="form-control" id="regNome" placeholder="Nome Completo" required>
                        <label>Nome Completo do Usuário</label>
                    </div>
                    <div class="form-floating mb-2">
                        <input type="email" class="form-control" id="regEmail" placeholder="Email" required>
                        <label>E-mail (para notificações)</label>
                    </div>
                    <div class="form-floating mb-2">
                        <input type="text" class="form-control" id="regCpf" placeholder="CPF" required>
                        <label>CPF</label>
                    </div>
                    <div class="form-floating mb-4 password-wrapper">
                        <input type="password" class="form-control" id="regPass" placeholder="Senha" required>
                        <label>Senha de Acesso</label>
                        <button
                            type="button"
                            class="password-toggle"
                            id="toggleRegPass"
                            onclick="togglePasswordVisibility('regPass', 'toggleRegPass')"
                            aria-label="Mostrar ou ocultar senha do cadastro"
                        >
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        Realizar Cadastro
                    </button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
    <script>
        function togglePasswordVisibility(inputId, buttonId) {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);
            if (!input || !button) return;

            const icon = button.querySelector('i');
            const showing = input.type === 'text';
            input.type = showing ? 'password' : 'text';

            if (icon) {
                icon.className = showing ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
            }
        }

        async function fazerLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Autenticando...';
            btn.disabled = true;

            try {
                const res = await fetch(API_LOGIN_URL, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        cpf: document.getElementById('loginCpf').value,
                        password: document.getElementById('loginPass').value
                    })
                });
                if(res.ok) {
                    Toast.fire({ icon: 'success', title: 'Bem-vindo de volta!' });
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    const json = await res.json();
                    Swal.fire({
                        icon: 'error',
                        title: 'Falha na Autenticação',
                        text: json.message || "Usuário ou senha inválidos",
                        confirmButtonColor: '#4f46e5'
                    });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Erro de Conexão', text: 'Não foi possível conectar ao servidor.' });
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // URLs injetadas pelo Jinja2 para respeitar sub-rotas em produção
        const API_LOGIN_URL = "{{ url_for('auth.login', _external=False) }}";
        const API_AVA_URL = "{{ url_for('auth.ava_login_redirect', _external=False) }}";
        const API_REGISTRAR_URL = "{{ url_for('auth.registrar', _external=False) }}";
        const API_PASSWORD_FORGOT_URL = "{{ url_for('auth.password_forgot', _external=False) }}";

        function entrarComAva() {
            window.location.href = API_AVA_URL;
        }

        async function fazerCadastro(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processando...';
            btn.disabled = true;

            try {
                const res = await fetch(API_REGISTRAR_URL, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        nome: document.getElementById('regNome').value,
                        email: document.getElementById('regEmail').value,
                        cpf: document.getElementById('regCpf').value,
                        password: document.getElementById('regPass').value
                    })
                });
                const json = await res.json();
                
                if(res.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Conta Criada!',
                        text: 'Sua conta foi criada com sucesso. Agora você pode entrar no sistema.',
                        confirmButtonColor: '#4f46e5'
                    }).then(() => {
                        document.getElementById('pills-login-tab').click();
                    });
                } else {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Atenção',
                        text: json.mensagem || json.erro,
                        confirmButtonColor: '#4f46e5'
                    });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Erro de Conexão', text: 'Não foi possível realizar o cadastro.' });
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function abrirRecuperacaoSenha(e) {
            e.preventDefault();
            const result = await Swal.fire({
                title: 'Recuperar senha',
                input: 'email',
                inputLabel: 'Informe seu e-mail cadastrado',
                inputPlaceholder: 'seuemail@dominio.com',
                showCancelButton: true,
                confirmButtonText: 'Enviar instruções',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#044d84'
            });

            if (!result.isConfirmed || !result.value) return;

            try {
                const res = await fetch(API_PASSWORD_FORGOT_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: result.value })
                });
                const json = await res.json();
                if (res.ok) {
                    Swal.fire('Pronto', json.mensagem || 'Instruções enviadas para o e-mail informado.', 'success');
                } else {
                    Swal.fire('Erro', json.erro || 'Não foi possível processar a solicitação.', 'error');
                }
            } catch (_) {
                Swal.fire('Erro', 'Falha de conexão ao solicitar recuperação.', 'error');
            }
        }
    </script>
{% endblock %}
