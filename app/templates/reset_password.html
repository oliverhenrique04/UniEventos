{% extends 'base.html' %}

{% block content %}
<div class="container py-5" style="max-width: 520px;">
    <div class="glass-panel bg-white border-top border-2 border-primary p-4 shadow-sm">
        <h4 class="fw-bold mb-2">Redefinir Senha</h4>
        <p class="text-muted small mb-4">Digite sua nova senha para concluir a recuperação.</p>

        <form onsubmit="redefinirSenha(event)">
            <input type="hidden" id="resetToken" value="{{ token }}">
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="newPassword" placeholder="Nova senha" required>
                <label>Nova senha</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirmar senha" required>
                <label>Confirmar senha</label>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="btnResetPassword">
                Salvar nova senha
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function redefinirSenha(e) {
        e.preventDefault();

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const token = document.getElementById('resetToken').value;
        if (newPassword !== confirmPassword) {
            Swal.fire('Atenção', 'As senhas não coincidem.', 'warning');
            return;
        }

        const btn = document.getElementById('btnResetPassword');
        const original = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvando...';

        try {
            const res = await fetch(apiUrl('/api/password/reset'), {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: token,
                    password: newPassword
                })
            });
            const json = await res.json();
            if (res.ok) {
                await Swal.fire('Sucesso', json.mensagem || 'Senha alterada com sucesso.', 'success');
                window.location.href = pathUrl('{{ url_for('main.index') }}');
            } else {
                Swal.fire('Erro', json.erro || 'Não foi possível redefinir a senha.', 'error');
            }
        } catch (_) {
            Swal.fire('Erro', 'Falha de conexão ao redefinir senha.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = original;
        }
    }
</script>
{% endblock %}
