<script>
    const userRole = {{ (user.role if user else '')|tojson }};
    const currentUsername = {{ (user.username if user else '')|tojson }};
    const currentUserCourseId = {{ (user.course_id if user and user.course_id is not none else none)|tojson }};
    const currentUserCourseName = {{ (user.curso if user and user.curso else none)|tojson }};
    const analyticsState = {
        periodDays: 30,
        courseId: userRole === 'coordenador' && currentUserCourseId !== null ? String(currentUserCourseId) : '',
        eventStatus: '',
        eventType: '',
        ownerUsername: '',
        goals: {
            presence: 75,
            emission: 85,
        },
    };

    document.addEventListener('DOMContentLoaded', () => {
        if (!document.getElementById('btnRefreshGestorAnalytics')) return;
        inicializarControlesAnalyticsGestor();
        carregarDashboardGestorAnalytics();
        document.getElementById('btnRefreshGestorAnalytics')?.addEventListener('click', () => carregarDashboardGestorAnalytics(true));
    });

    function formatInteger(value) {
        return Number(value || 0).toLocaleString('pt-BR');
    }

    function formatPercent(value) {
        return `${Number(value || 0).toLocaleString('pt-BR', { minimumFractionDigits: 1, maximumFractionDigits: 1 })}%`;
    }

    const BRASILIA_TIMEZONE = 'America/Sao_Paulo';

    function parseApiDate(value) {
        if (!value) return null;
        if (value instanceof Date) return Number.isNaN(value.getTime()) ? null : value;

        const raw = String(value).trim();
        if (!raw) return null;

        const hasTimezoneInfo = /(?:Z|[+-]\d{2}:?\d{2})$/i.test(raw);
        const normalized = hasTimezoneInfo ? raw : `${raw}Z`;
        const dt = new Date(normalized);
        return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function formatDateBrasilia(value) {
        const dt = parseApiDate(value);
        if (!dt) return '-';
        return dt.toLocaleDateString('pt-BR', { timeZone: BRASILIA_TIMEZONE });
    }

    function formatTimeBrasilia(value) {
        const dt = parseApiDate(value);
        if (!dt) return '--:--';
        return dt.toLocaleTimeString('pt-BR', {
            hour: '2-digit',
            minute: '2-digit',
            timeZone: BRASILIA_TIMEZONE
        });
    }

    function getAnalyticsGoalsStorageKey() {
        return `gestor-dashboard-goals:${currentUsername || 'anonymous'}`;
    }

    function loadAnalyticsGoalsFromStorage() {
        try {
            const raw = localStorage.getItem(getAnalyticsGoalsStorageKey());
            if (!raw) return;
            const parsed = JSON.parse(raw);
            const presence = Number(parsed?.presence);
            const emission = Number(parsed?.emission);
            if (presence >= 1 && presence <= 100) analyticsState.goals.presence = presence;
            if (emission >= 1 && emission <= 100) analyticsState.goals.emission = emission;
        } catch (_) {}
    }

    function saveAnalyticsGoalsToStorage() {
        localStorage.setItem(getAnalyticsGoalsStorageKey(), JSON.stringify(analyticsState.goals));
    }

    async function parseJsonSafeResponse(res) {
        const text = await res.text();
        try {
            return JSON.parse(text || '{}');
        } catch (_) {
            if (!res.ok) {
                throw new Error(`Falha na API (${res.status}). Resposta inválida recebida.`);
            }
            throw new Error('Resposta inválida do servidor. Recarregue a página e tente novamente.');
        }
    }

    function setActivePeriodButton() {
        document.querySelectorAll('.analytics-period-btn').forEach(btn => {
            const isActive = Number(btn.dataset.days) === Number(analyticsState.periodDays);
            btn.classList.toggle('btn-primary', isActive);
            btn.classList.toggle('btn-outline-primary', !isActive);
        });
    }

    function isAnalyticsCourseLocked() {
        return userRole === 'coordenador';
    }

    function getLockedAnalyticsCourseId() {
        if (!isAnalyticsCourseLocked() || currentUserCourseId === null || currentUserCourseId === undefined) {
            return '';
        }
        return String(currentUserCourseId);
    }

    function getLockedAnalyticsCourseLabel() {
        return currentUserCourseName || 'Curso não vinculado';
    }

    async function carregarCursosAnalyticsFiltro() {
        const select = document.getElementById('analyticsCourseFilter');
        if (!select) return;

        try {
            const res = await fetch(apiUrl('/api/courses/'), { headers: { 'Accept': 'application/json' } });
            const data = await parseJsonSafeResponse(res);
            if (!res.ok || !Array.isArray(data)) return;

            if (isAnalyticsCourseLocked()) {
                const lockedCourseId = getLockedAnalyticsCourseId();
                const lockedCourse = data.find(c => String(c.id) === lockedCourseId);
                const lockedCourseValue = lockedCourse ? String(lockedCourse.id) : lockedCourseId;
                const lockedCourseLabel = lockedCourse?.nome || getLockedAnalyticsCourseLabel();

                analyticsState.courseId = lockedCourseValue || '';
                select.innerHTML = `<option value="${lockedCourseValue}" selected>${lockedCourseLabel}</option>`;
                select.disabled = true;
                return;
            }

            const currentValue = analyticsState.courseId || '';
            const options = data
                .map(c => `<option value="${c.id}">${c.nome}</option>`)
                .join('');
            select.innerHTML = `<option value="">Todos os cursos</option>${options}`;
            select.disabled = false;
            select.value = currentValue;
        } catch (_) {}
    }

    function setSelectValueIfPresent(selectId, value) {
        const select = document.getElementById(selectId);
        if (!select) return;
        const normalized = String(value || '');
        const exists = Array.from(select.options).some(option => option.value === normalized);
        select.value = exists ? normalized : '';
    }

    function popularResponsaveisAnalytics(items = []) {
        const select = document.getElementById('analyticsOwnerFilter');
        if (!select) return;

        const previousValue = analyticsState.ownerUsername || '';
        const options = (items || [])
            .map(item => `<option value="${item.username}">${item.name}</option>`)
            .join('');

        select.innerHTML = `<option value="">Todos os responsáveis</option>${options}`;
        setSelectValueIfPresent('analyticsOwnerFilter', previousValue);
        analyticsState.ownerUsername = select.value || '';
    }

    function obterTextoOpcao(selectId, fallback = 'Todos') {
        const select = document.getElementById(selectId);
        if (!select) return fallback;
        const option = select.options[select.selectedIndex];
        return option?.text?.trim() || fallback;
    }

    function renderAnalyticsActiveFilters() {
        const container = document.getElementById('analyticsActiveFilters');
        if (!container) return;

        const chips = [
            `<span class="analytics-filter-chip"><i class="fa-regular fa-calendar"></i>${analyticsState.periodDays} dias</span>`
        ];

        if (analyticsState.courseId) {
            chips.push(`<span class="analytics-filter-chip"><i class="fa-solid fa-graduation-cap"></i>${obterTextoOpcao('analyticsCourseFilter')}</span>`);
        }
        if (analyticsState.eventStatus) {
            chips.push(`<span class="analytics-filter-chip"><i class="fa-solid fa-signal"></i>${obterTextoOpcao('analyticsStatusFilter')}</span>`);
        }
        if (analyticsState.eventType) {
            chips.push(`<span class="analytics-filter-chip"><i class="fa-solid fa-layer-group"></i>${obterTextoOpcao('analyticsTypeFilter')}</span>`);
        }
        if (analyticsState.ownerUsername) {
            chips.push(`<span class="analytics-filter-chip"><i class="fa-solid fa-user-tie"></i>${obterTextoOpcao('analyticsOwnerFilter')}</span>`);
        }

        container.innerHTML = chips.join('');
    }

    function renderAnalyticsContext(summary = {}) {
        const el = document.getElementById('analyticsContextText');
        if (!el) return;

        const totalEvents = Number(summary.total_events || 0);
        const totalCourses = Number(summary.total_courses || 0);
        const totalEnrollments = Number(summary.total_enrollments || 0);

        el.textContent = `Recorte atual: ${analyticsState.periodDays} dias, ${formatInteger(totalEvents)} eventos, ${formatInteger(totalCourses)} cursos e ${formatInteger(totalEnrollments)} inscrições consolidadas.`;
    }

    function renderStatusBreakdown(summary = {}, pipeline = {}, institutionalSummary = {}) {
        const wrapper = document.getElementById('analyticsStatusBreakdown');
        if (!wrapper) return;

        const withCertificate = Number(pipeline?.with_certificate || 0);
        const withoutCertificate = Number(pipeline?.without_certificate || 0);
        const certificateCoverage = (withCertificate + withoutCertificate) > 0
            ? (withCertificate / (withCertificate + withoutCertificate)) * 100
            : 0;

        wrapper.innerHTML = `
            <div class="analytics-mini-card">
                <div class="analytics-mini-label">Eventos</div>
                <div class="analytics-mini-value">${formatInteger(summary.total_events)}</div>
                <small class="analytics-mini-caption">${formatInteger(summary.active_events)} abertos no período</small>
            </div>
            <div class="analytics-mini-card">
                <div class="analytics-mini-label">Presença</div>
                <div class="analytics-mini-value">${formatPercent(summary.presence_rate)}</div>
                <small class="analytics-mini-caption">${formatInteger(summary.total_enrollments)} inscrições auditadas</small>
            </div>
            <div class="analytics-mini-card">
                <div class="analytics-mini-label">Cobertura</div>
                <div class="analytics-mini-value">${formatPercent(certificateCoverage)}</div>
                <small class="analytics-mini-caption">${formatInteger(summary.pending_certificate_events)} evento(s) com pendência</small>
            </div>
            <div class="analytics-mini-card">
                <div class="analytics-mini-label">Entrega Acadêmica</div>
                <div class="analytics-mini-value">${formatPercent(institutionalSummary.delivery_rate)}</div>
                <small class="analytics-mini-caption">${formatInteger(institutionalSummary.pending_recipients)} destinatário(s) pendentes</small>
            </div>
        `;
    }

    function renderExecutiveSummary(data = {}) {
        const container = document.getElementById('analyticsExecutiveSummary');
        if (!container) return;

        const summary = data.summary || {};
        const pipeline = data.certificate_pipeline || {};
        const institutionalSummary = data.institutional_summary || {};
        const topCourseByEvents = data.events_by_course?.[0];
        const topCourseByStudents = data.students_by_course?.[0];
        const highestRisk = data.pending_certificate_events?.[0];
        const withCertificate = Number(pipeline.with_certificate || 0);
        const withoutCertificate = Number(pipeline.without_certificate || 0);
        const coverageRate = (withCertificate + withoutCertificate) > 0
            ? (withCertificate / (withCertificate + withoutCertificate)) * 100
            : 0;

        const overview = `
            No recorte dos últimos <strong>${analyticsState.periodDays} dias</strong>, o painel consolidou
            <strong>${formatInteger(summary.total_events)}</strong> evento(s), <strong>${formatInteger(summary.total_enrollments)}</strong>
            inscrição(ões) e uma taxa média de presença de <strong>${formatPercent(summary.presence_rate)}</strong>.
            A cobertura de emissão para eventos ficou em <strong>${formatPercent(coverageRate)}</strong> e a entrega institucional em
            <strong>${formatPercent(institutionalSummary.delivery_rate)}</strong>.
        `;

        const points = [
            {
                icon: 'fa-graduation-cap',
                title: 'Curso com maior tração',
                text: topCourseByEvents
                    ? `${topCourseByEvents.course} lidera em volume com ${formatInteger(topCourseByEvents.count)} evento(s) no período.`
                    : 'Ainda não há volume suficiente para destacar um curso por oferta.',
            },
            {
                icon: 'fa-users',
                title: 'Base de participação',
                text: topCourseByStudents
                    ? `${topCourseByStudents.course} concentrou a maior base de alunos ativos, com ${formatInteger(topCourseByStudents.count)} participante(s) únicos.`
                    : 'Ainda não há base suficiente para destacar uma concentração de alunos.',
            },
            {
                icon: 'fa-triangle-exclamation',
                title: 'Ponto crítico prioritário',
                text: highestRisk
                    ? `${highestRisk.name} é o principal foco imediato, com ${formatInteger(highestRisk.pending_count)} certificado(s) pendente(s).`
                    : 'Não há passivos críticos de certificados no recorte atual.',
            },
        ];

        container.innerHTML = `
            <div class="analytics-summary-text">${overview}</div>
            <ul class="analytics-summary-points">
                ${points.map(item => `
                    <li class="analytics-summary-point">
                        <span class="analytics-summary-icon"><i class="fa-solid ${item.icon}"></i></span>
                        <div>
                            <div class="fw-semibold text-slate-800 mb-1">${item.title}</div>
                            <div class="text-muted small">${item.text}</div>
                        </div>
                    </li>
                `).join('')}
            </ul>
        `;
    }

    function renderAlertasProativos(summary, pipeline, institutionalSummary) {
        const container = document.getElementById('analyticsAlerts');
        if (!container) return;

        const alerts = [];
        const presenceRate = Number(summary?.presence_rate || 0);
        if (presenceRate < analyticsState.goals.presence) {
            alerts.push(`Taxa de presença abaixo da meta (${formatPercent(presenceRate)} < ${formatPercent(analyticsState.goals.presence)}).`);
        }

        const withCertificate = Number(pipeline?.with_certificate || 0);
        const withoutCertificate = Number(pipeline?.without_certificate || 0);
        const emissionRate = (withCertificate + withoutCertificate) > 0
            ? (withCertificate / (withCertificate + withoutCertificate)) * 100
            : 0;
        if (emissionRate < analyticsState.goals.emission) {
            alerts.push(`Emissão de certificados de eventos abaixo da meta (${formatPercent(emissionRate)} < ${formatPercent(analyticsState.goals.emission)}).`);
        }

        const academicDeliveryRate = Number(institutionalSummary?.delivery_rate || 0);
        if (academicDeliveryRate < analyticsState.goals.emission && Number(institutionalSummary?.total_recipients || 0) > 0) {
            alerts.push(`Entrega de certificados acadêmicos abaixo da meta (${formatPercent(academicDeliveryRate)} < ${formatPercent(analyticsState.goals.emission)}).`);
        }

        if (!alerts.length) {
            container.innerHTML = '<span class="text-success"><i class="fa-solid fa-circle-check me-1"></i>Todas as metas estão dentro do esperado no período selecionado.</span>';
            return;
        }

        container.innerHTML = `<ul class="mb-0 ps-3">${alerts.map(item => `<li class="text-warning-emphasis">${item}</li>`).join('')}</ul>`;
    }

    function renderAcademicoSummary(summary) {
        const wrapper = document.getElementById('academicoSummaryCards');
        if (!wrapper) return;

        wrapper.innerHTML = `
            <div class="col-md-3"><div class="kpi-card"><div class="kpi-label">Certificados</div><div class="kpi-value">${formatInteger(summary.total_certificates)}</div><small class="text-muted">Rascunho: ${formatInteger(summary.draft_certificates)} • Enviado: ${formatInteger(summary.sent_certificates)}</small></div></div>
            <div class="col-md-3"><div class="kpi-card"><div class="kpi-label">Destinatários</div><div class="kpi-value">${formatInteger(summary.total_recipients)}</div><small class="text-muted">Arquivados: ${formatInteger(summary.archived_certificates)}</small></div></div>
            <div class="col-md-3"><div class="kpi-card"><div class="kpi-label">Entregues</div><div class="kpi-value">${formatInteger(summary.delivered_recipients)}</div><small class="text-muted">Pendentes: ${formatInteger(summary.pending_recipients)}</small></div></div>
            <div class="col-md-3"><div class="kpi-card"><div class="kpi-label">Taxa de Entrega</div><div class="kpi-value">${formatPercent(summary.delivery_rate)}</div><small class="text-muted">Eficiência de envio acadêmico</small></div></div>
        `;
    }

    function renderPendenciasAcademicas(items) {
        const tbody = document.getElementById('tabelaPendenciasAcademicoGestor');
        if (!tbody) return;

        if (!items || !items.length) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">Sem pendências acadêmicas relevantes no período.</td></tr>';
            return;
        }

        tbody.innerHTML = items.map(item => `
            <tr>
                <td><span class="fw-semibold">${item.title}</span></td>
                <td>${item.category || '-'}</td>
                <td>${formatInteger(item.recipients_count)}</td>
                <td><span class="badge bg-warning-subtle text-warning-emphasis border border-warning-subtle">${formatInteger(item.pending_count)}</span></td>
            </tr>
        `).join('');
    }

    function inicializarControlesAnalyticsGestor() {
        loadAnalyticsGoalsFromStorage();

        const presenceInput = document.getElementById('goalPresenceInput');
        const emissionInput = document.getElementById('goalEmissionInput');
        if (presenceInput) presenceInput.value = analyticsState.goals.presence;
        if (emissionInput) emissionInput.value = analyticsState.goals.emission;

        setActivePeriodButton();
        carregarCursosAnalyticsFiltro();

        document.querySelectorAll('.analytics-period-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                analyticsState.periodDays = Number(btn.dataset.days || 30);
                setActivePeriodButton();
                renderAnalyticsActiveFilters();
                carregarDashboardGestorAnalytics(true);
            });
        });

        document.getElementById('analyticsCourseFilter')?.addEventListener('change', (ev) => {
            analyticsState.courseId = ev.target.value || '';
            renderAnalyticsActiveFilters();
            carregarDashboardGestorAnalytics(true);
        });

        document.getElementById('analyticsStatusFilter')?.addEventListener('change', (ev) => {
            analyticsState.eventStatus = ev.target.value || '';
            renderAnalyticsActiveFilters();
            carregarDashboardGestorAnalytics(true);
        });

        document.getElementById('analyticsTypeFilter')?.addEventListener('change', (ev) => {
            analyticsState.eventType = ev.target.value || '';
            renderAnalyticsActiveFilters();
            carregarDashboardGestorAnalytics(true);
        });

        document.getElementById('analyticsOwnerFilter')?.addEventListener('change', (ev) => {
            analyticsState.ownerUsername = ev.target.value || '';
            renderAnalyticsActiveFilters();
            carregarDashboardGestorAnalytics(true);
        });

        document.getElementById('btnClearAnalyticsFilters')?.addEventListener('click', () => {
            analyticsState.periodDays = 30;
            analyticsState.courseId = isAnalyticsCourseLocked() ? getLockedAnalyticsCourseId() : '';
            analyticsState.eventStatus = '';
            analyticsState.eventType = '';
            analyticsState.ownerUsername = '';
            setActivePeriodButton();
            setSelectValueIfPresent('analyticsCourseFilter', analyticsState.courseId);
            setSelectValueIfPresent('analyticsStatusFilter', '');
            setSelectValueIfPresent('analyticsTypeFilter', '');
            setSelectValueIfPresent('analyticsOwnerFilter', '');
            renderAnalyticsActiveFilters();
            carregarDashboardGestorAnalytics(true);
        });

        document.getElementById('btnSaveAnalyticsGoals')?.addEventListener('click', () => {
            const presence = Number(document.getElementById('goalPresenceInput')?.value || analyticsState.goals.presence);
            const emission = Number(document.getElementById('goalEmissionInput')?.value || analyticsState.goals.emission);
            if (presence < 1 || presence > 100 || emission < 1 || emission > 100) {
                Swal.fire('Metas inválidas', 'Informe valores entre 1 e 100 para presença e emissão.', 'warning');
                return;
            }
            analyticsState.goals.presence = presence;
            analyticsState.goals.emission = emission;
            saveAnalyticsGoalsToStorage();
            Toast.fire({ icon: 'success', title: 'Metas salvas com sucesso.' });
            carregarDashboardGestorAnalytics(true);
        });

        renderAnalyticsActiveFilters();
    }

    function renderRankingList(containerId, items, maxValue) {
        const container = document.getElementById(containerId);
        if (!container) return;

        if (!items || !items.length) {
            container.innerHTML = '<li class="text-muted small">Sem dados suficientes para análise.</li>';
            return;
        }

        const top = Math.max(maxValue || 0, items[0]?.count || 1, 1);
        container.innerHTML = items.map((item, index) => {
            const ratio = Math.min((item.count / top) * 100, 100);
            const label = item.course || item.category || item.label || 'Sem classificação';
            return `
                <li class="rank-item">
                    <div>
                        <div class="fw-semibold text-slate-700">${index + 1}. ${label}</div>
                        <div class="rank-track"><div class="rank-fill" style="width:${ratio.toFixed(1)}%"></div></div>
                    </div>
                    <span class="badge bg-light text-dark border">${formatInteger(item.count)}</span>
                </li>
            `;
        }).join('');
    }

    function renderPendenciasCertificados(items) {
        const tbody = document.getElementById('tabelaPendenciasCertificadosGestor');
        if (!tbody) return;

        if (!items || !items.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">Nenhuma pendência crítica de certificado encontrada.</td></tr>';
            return;
        }

        tbody.innerHTML = items.map(item => {
            const data = formatDateBrasilia(item.start_date);
            return `
                <tr>
                    <td>
                        <div class="fw-semibold">${item.name}</div>
                        <small class="text-muted">Início: ${data}</small>
                    </td>
                    <td>${item.course || '-'}</td>
                    <td>${formatInteger(item.enrollments_count)}</td>
                    <td>${formatInteger(item.presence_count)}</td>
                    <td>${formatInteger(item.cert_generated_count)}</td>
                    <td><span class="badge bg-warning-subtle text-warning-emphasis border border-warning-subtle">${formatInteger(item.pending_count)}</span></td>
                </tr>
            `;
        }).join('');
    }

    function renderGestorKpis(summary, pipeline) {
        const grid = document.getElementById('gestorKpiGrid');
        if (!grid) return;

        const withCertificate = Number(pipeline?.with_certificate || 0);
        const withoutCertificate = Number(pipeline?.without_certificate || 0);
        const totalCertificateTracked = withCertificate + withoutCertificate;
        const completionRate = totalCertificateTracked ? ((withCertificate / totalCertificateTracked) * 100) : 0;

        grid.innerHTML = `
            <div class="kpi-card">
                <div class="kpi-label">Eventos Monitorados</div>
                <div class="kpi-value">${formatInteger(summary.total_events)}</div>
                <div class="kpi-meta">
                    <span class="kpi-meta-badge"><i class="fa-regular fa-circle-play"></i>${formatInteger(summary.active_events)} abertos</span>
                    <span class="kpi-meta-badge"><i class="fa-regular fa-circle-stop"></i>${formatInteger(summary.closed_events)} encerrados</span>
                </div>
                <small class="kpi-note">${formatInteger(summary.total_courses)} curso(s) com movimentação no período.</small>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Base de Participação</div>
                <div class="kpi-value">${formatInteger(summary.unique_students)}</div>
                <div class="kpi-meta">
                    <span class="kpi-meta-badge"><i class="fa-solid fa-users"></i>${formatInteger(summary.total_enrollments)} inscrições</span>
                </div>
                <small class="kpi-note">Participantes únicos engajados em atividades do recorte.</small>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Eficiência de Presença</div>
                <div class="kpi-value">${formatPercent(summary.presence_rate)}</div>
                <div class="kpi-meta">
                    <span class="kpi-meta-badge"><i class="fa-solid fa-bullseye"></i>Meta atual ${formatPercent(analyticsState.goals.presence)}</span>
                </div>
                <small class="kpi-note">Eficiência de comparecimento nas atividades registradas.</small>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Cobertura de Certificados</div>
                <div class="kpi-value">${formatPercent(completionRate)}</div>
                <div class="kpi-meta">
                    <span class="kpi-meta-badge"><i class="fa-solid fa-certificate"></i>${formatInteger(withCertificate)} com emissão</span>
                    <span class="kpi-meta-badge"><i class="fa-solid fa-triangle-exclamation"></i>${formatInteger(withoutCertificate)} sem emissão</span>
                </div>
                <small class="kpi-note">${formatInteger(summary.pending_certificate_events)} evento(s) exigem ação prioritária.</small>
            </div>
        `;
    }

    function renderAnalyticsTimestamp(isoDate) {
        const el = document.getElementById('analyticsLastUpdate');
        if (!el) return;

        if (!isoDate) {
            el.innerHTML = '<i class="fa-regular fa-clock"></i>Atualização indisponível';
            return;
        }

        el.innerHTML = `<i class="fa-regular fa-clock"></i>Atualizado às ${formatTimeBrasilia(isoDate)} (BRT)`;
    }

    async function carregarDashboardGestorAnalytics(forceRefresh = false) {
        const refreshBtn = document.getElementById('btnRefreshGestorAnalytics');
        if (refreshBtn) {
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i>Atualizando';
        }

        try {
            const params = new URLSearchParams();
            params.set('period_days', String(analyticsState.periodDays));
            if (analyticsState.courseId) params.set('course_id', String(analyticsState.courseId));
            if (analyticsState.eventStatus) params.set('event_status', analyticsState.eventStatus);
            if (analyticsState.eventType) params.set('event_type', analyticsState.eventType);
            if (analyticsState.ownerUsername) params.set('owner_username', analyticsState.ownerUsername);
            if (forceRefresh) params.set('t', String(Date.now()));

            const res = await fetch(apiUrl(`/api/dashboard/analytics?${params.toString()}`), {
                headers: { 'Accept': 'application/json' }
            });
            const data = await parseJsonSafeResponse(res);
            if (!res.ok) {
                throw new Error(data.erro || 'Falha ao carregar painel analítico.');
            }

            popularResponsaveisAnalytics(data.filter_options?.owners || []);
            renderAnalyticsActiveFilters();
            renderAnalyticsContext(data.summary || {});
            renderExecutiveSummary(data);
            renderStatusBreakdown(data.summary || {}, data.certificate_pipeline || {}, data.institutional_summary || {});
            renderGestorKpis(data.summary || {}, data.certificate_pipeline || {});
            renderRankingList('rankingEventosCurso', data.events_by_course || [], data.events_by_course?.[0]?.count || 1);
            renderRankingList('rankingAlunosCurso', data.students_by_course || [], data.students_by_course?.[0]?.count || 1);
            renderAcademicoSummary(data.institutional_summary || {});
            renderRankingList('rankingAcademicoCategoria', data.institutional_by_category || [], data.institutional_by_category?.[0]?.count || 1);
            renderPendenciasAcademicas(data.institutional_pending || []);
            renderPendenciasCertificados(data.pending_certificate_events || []);
            renderAlertasProativos(data.summary || {}, data.certificate_pipeline || {}, data.institutional_summary || {});
            renderAnalyticsTimestamp(data.generated_at);
        } catch (error) {
            const executive = document.getElementById('analyticsExecutiveSummary');
            if (executive) {
                executive.innerHTML = `<span class="text-danger">${error.message || 'Não foi possível consolidar o resumo executivo.'}</span>`;
            }
            const statusGrid = document.getElementById('analyticsStatusBreakdown');
            if (statusGrid) {
                statusGrid.innerHTML = `
                    <div class="analytics-mini-card">
                        <div class="analytics-mini-label">Falha</div>
                        <div class="analytics-mini-value">--</div>
                        <small class="analytics-mini-caption">Não foi possível atualizar os indicadores.</small>
                    </div>
                `;
            }
            const context = document.getElementById('analyticsContextText');
            if (context) {
                context.textContent = 'Não foi possível consolidar o recorte atual.';
            }
            const tbody = document.getElementById('tabelaPendenciasCertificadosGestor');
            if (tbody) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-3">${error.message || 'Não foi possível carregar os indicadores.'}</td></tr>`;
            }
            const tbodyAcademic = document.getElementById('tabelaPendenciasAcademicoGestor');
            if (tbodyAcademic) {
                tbodyAcademic.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-3">${error.message || 'Não foi possível carregar os indicadores acadêmicos.'}</td></tr>`;
            }
            Toast.fire({ icon: 'error', title: error.message || 'Falha ao carregar analytics.' });
        } finally {
            if (refreshBtn) {
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = '<i class="fa-solid fa-rotate me-1"></i>Atualizar';
            }
        }
    }
</script>
