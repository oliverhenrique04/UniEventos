<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{{ subject }}</title>
    <style>
        /* Estilos gerais */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f7;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        /* Remove espaçamentos indesejados no Outlook */
        table,
        td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        /* Responsividade */
        @media only screen and (max-width: 600px) {
            .container {
                width: 100% !important;
                padding: 20px !important;
            }
            
            .content-padding {
                padding: 30px 20px !important;
            }
        }
    </style>
</head>

<body style="margin: 0; padding: 0; background-color: #f4f4f7; font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px;">
        <!-- Cabeçalho com Logo -->
        <tr>
            <td align="center" style="padding: 30px 0 20px 0; background-color: #ffffff;">
                <img src="https://unieuro.edu.br/wp-content/uploads/2019/02/unieuro2.png" 
                     alt="Logotipo UNIEURO" 
                     width="150" 
                     style="display: block; max-width: 150px;">
            </td>
        </tr>

        <!-- Conteúdo Principal -->
        <tr>
            <td bgcolor="#FFFFFF" class="container"
                style="padding: 40px 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                {{ content }}
            </td>
        </tr>

        <!-- Rodapé -->
        <tr>
            <td align="center" style="padding: 20px 0; font-size: 12px; color: #a0aec0;">
                <p style="margin: 0 0 5px 0;">Esta é uma comunicação automática do sistema UniEventos. Não responda a esta mensagem.</p>
                <p style="margin: 0;">© {{ year }} NUTED Unieuro. Todos os direitos reservados.</p>
                <p style="margin: 10px 0 0 0; font-size: 11px;">
                    <a href="{{ unsubscribe_url }}" style="color: #718096; text-decoration: underline;">Desinscrever</a>
                </p>
            </td>
        </tr>
    </table>
</body>

</html>
