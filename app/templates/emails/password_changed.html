{% extends 'emails/base.html' %}

{% block email_content %}
<h2 style="margin:0 0 10px 0; color:#0f172a; font-size:24px;">Senha alterada com sucesso</h2>
<p style="margin:0 0 14px 0;">Olá, <strong>{{ user_name }}</strong>.</p>
<p style="margin:0 0 14px 0;">Confirmamos que sua senha foi alterada em {{ changed_at }}.</p>
<p style="margin:0; color:#64748b; font-size:13px;">Se você não fez essa alteração, utilize a recuperação de senha imediatamente.</p>
{% endblock %}
