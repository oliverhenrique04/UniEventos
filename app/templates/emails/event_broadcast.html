{% extends 'emails/base.html' %}

{% block email_content %}
<h2 style="margin:0 0 10px 0; color:#0f172a; font-size:24px;">Comunicado acadêmico</h2>
<p style="margin:0 0 14px 0;">Prezado(a) <strong>{{ user_name }}</strong>,</p>
<p style="margin:0 0 14px 0;">Confira abaixo a mensagem encaminhada pela organização do evento.</p>

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin:0 0 14px 0; background:#f8fafc; border:1px solid #e2e8f0; border-left:4px solid #044d84; border-radius:10px;">
    <tr><td style="padding:14px;"><strong>Evento:</strong> {{ event_name }}</td></tr>
</table>

<p style="margin:0 0 14px 0; white-space:pre-line;">{{ message_text }}</p>

<table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 12px 0;">
    <tr>
        <td style="background:#044d84; border-radius:8px;">
            <a href="{{ app_url }}" style="display:inline-block; padding:11px 18px; color:#fff; text-decoration:none; font-weight:700;">Acessar EuroEventos</a>
        </td>
    </tr>
</table>
{% endblock %}
