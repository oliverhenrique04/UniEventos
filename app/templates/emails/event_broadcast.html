<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
</head>
<body>
    <table border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td style="color: #1a202c; font-size: 24px; font-weight: bold; text-align: center;">
                Comunicado acadêmico
            </td>
        </tr>
        <tr>
            <td style="padding: 20px 0;">
                <hr style="border: 0; border-top: 1px solid #e2e8f0;">
            </td>
        </tr>
        <tr>
            <td style="background-color: #edf2f7; border-left: 4px solid #005A9C; padding: 20px; font-size: 16px; border-radius: 4px; margin-bottom: 16px;">
                <p style="margin: 0; color: #2d3748;"><strong>Evento:</strong> {{ event_name }}</p>
            </td>
        </tr>
        <tr>
            <td style="color: #4a5568; font-size: 16px; line-height: 1.6; padding-top: 16px;">
                <p style="margin: 0 0 20px 0;">Prezado(a) <strong>{{ user_name }}</strong>,</p>
                <p style="margin: 0; white-space: pre-line;">{{ message_text }}</p>
            </td>
        </tr>
        <tr>
            <td align="center" style="padding: 30px 0;">
                <a href="{{ app_url }}" target="_blank"
                   style="display: inline-block; background-color: #005A9C; color: #ffffff; text-decoration: none; padding: 14px 26px; border-radius: 5px; font-size: 16px; font-weight: bold;">
                    Acessar EuroEventos
                </a>
            </td>
        </tr>
    </table>
</body>
</html>
