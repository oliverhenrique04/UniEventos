services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    privileged: true
    restart: always
    environment:
      - OLLAMA_HOST=0.0.0.0
      # AJUSTADO: Agora aceita origens via HTTPS
      - OLLAMA_ORIGINS=https://nuted-ia.dev,https://164.41.75.220,https://localhost
      - OLLAMA_KEEP_ALIVE=5h
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-tools

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    restart: always
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # AJUSTADO: URL externa agora é HTTPS
      - WEBUI_URL=https://nuted-ia.dev
      - RAG_SYSTEM_CONTEXT=True
      - ENABLE_QUERIES_CACHE=True
      - ENABLE_BASE_MODELS_CACHE=True
      - MODELS_CACHE_TTL=300
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    networks:
      - ai-tools

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    volumes:
      - /home/mrosa/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - /home/mrosa/docker/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "443:443" # Porta externa 7775 vai para a 443 (SSL) interna
    depends_on:
      - ollama
      - open-webui
      - n8n
      - metabase
      - rabbitmq
    networks:
      - ai-tools
      
  n8n:
    image: docker.io/n8nio/n8n:latest
    container_name: n8n
    restart: always
    environment:
      - N8N_HOST=nuted-ia.dev
      - N8N_PORT=5678               
      - N8N_PROTOCOL=https           
      - N8N_PATH=/n8n/
      # AJUSTADO: URLs de Webhook e Editor agora em HTTPS + Porta 7775
      - WEBHOOK_URL=https://nuted-ia.dev/n8n/
      - N8N_EDITOR_BASE_URL=https://nuted-ia.dev/n8n/
      - N8N_SECURE_COOKIE=true     
      - N8N_RUNNERS_TASK_REQUEST_TIMEOUT=120
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto,fs,path,os,util,child_process,events,stream,buffer,net,http,https
      - NODE_FUNCTION_ALLOW_EXTERNAL=lodash,axios,moment,uuid,js-yaml,form-data,csv-parse,xml2js,cheerio
      - N8N_BLOCK_JS_EXTENSIONS_ALLOWLIST=true      
    volumes:
      - n8n_data:/home/node/.n8n    
    depends_on:
      - postgres
    networks:
      - ai-tools

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres        
      - POSTGRES_PASSWORD=106293 
      - POSTGRES_DB=n8n_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-tools

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: always
    # Ports 3000 mantida, mas idealmente você acessará via nuted-ia.dev/metabase/
    volumes:
      - metabase_data:/metabase-data
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
    depends_on:
      - postgres
    networks:
      - ai-tools

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "7770:5672"   # Porta AMQP (protocolo RabbitMQ) → Mapeada para 7770
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ai-tools

networks:
  ai-tools:

volumes:
  ollama:
    external: true
  open-webui:
    external: true
  n8n_data:
  postgres_data: 
  metabase_data:
  rabbitmq_data:
